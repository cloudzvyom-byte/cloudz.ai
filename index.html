<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <title>Clouds AI — Human automation. AI scale.</title>
    <meta name="description" content="Clouds is your AI-powered workforce platform for managing sales, support, and outreach agents." />
    
    <style>
      html, body, #root {
        background-color: #000000 !important;
        color: #FFFFFF;
        margin: 0; padding: 0; min-height: 100vh;
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      }
      #splash-logo {
        width: 160px;
        height: 160px;
        animation: pulse-logo 2.5s ease-in-out infinite;
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        50% { transform: scale(1.05); opacity: 0.7; filter: drop-shadow(0 0 30px rgba(255,255,255,0.4)); }
      }
      .loaded #splash-screen {
        opacity: 0;
        visibility: hidden;
      }
    </style>

    <script>
      (function() {
        const t = localStorage.getItem('operon_theme') || 'white-cherry';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="splash-screen">
      <!-- High-Fidelity SVG Recreation of User Logo -->
      <svg id="splash-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="globe-grad-final" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF6B1A;stop-opacity:0.8" />
          </linearGradient>
          <filter id="globe-glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <g filter="url(#globe-glow)">
          <!-- Outer Circle -->
          <circle cx="50" cy="50" r="40" fill="none" stroke="url(#globe-grad-final)" stroke-width="2.5" />
          
          <!-- Vertical Ellipses (Longitudes) -->
          <ellipse cx="50" cy="50" rx="18" ry="40" fill="none" stroke="url(#globe-grad-final)" stroke-width="2" />
          
          <!-- Horizontal Line (Equator) -->
          <line x1="10" y1="50" x2="90" y2="50" stroke="url(#globe-grad-final)" stroke-width="2" />
          
          <!-- Diamond Center Fill (Subtle) -->
          <path d="M50 32 L59 50 L50 68 L41 50 Z" fill="url(#globe-grad-final)" opacity="0.4">
             <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" />
          </path>
        </g>
      </svg>
      <div style="margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 16px;">
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.4em; color: #FFFFFF; text-transform: uppercase; opacity: 0.6;">Loading...</div>
        <div style="width: 120px; height: 1px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden;">
           <div style="position: absolute; inset: 0; background: linear-gradient(90deg, transparent, #FF6B1A, transparent); animation: loading-bar 2s infinite linear;"></div>
        </div>
      </div>
      <style>
        @keyframes loading-bar {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
        #splash-logo {
          width: 100px;
          height: 100px;
          animation: logo-pulse 3s ease-in-out infinite;
        }
        @keyframes logo-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.05); opacity: 0.8; }
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const hideSplash = () => {
        document.body.classList.add('loaded');
      };
      window.addEventListener('load', () => {
        setTimeout(hideSplash, 1000);
      });
      // Safety Fallback: Hide splash after 5 seconds no matter what
      setTimeout(hideSplash, 5000);
    </script>
  </body>
</html>
