<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <title>Clouds AI — Human automation. AI scale.</title>
    <meta name="description" content="Clouds is your AI-powered workforce platform for managing sales, support, and outreach agents." />
    
    <style>
      html, body, #root {
        background-color: #000000 !important;
        color: #FFFFFF;
        margin: 0; padding: 0; min-height: 100vh;
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      }
      #splash-logo {
        width: 160px;
        height: 160px;
        animation: pulse-logo 2.5s ease-in-out infinite;
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        50% { transform: scale(1.05); opacity: 0.7; filter: drop-shadow(0 0 30px rgba(255,255,255,0.4)); }
      }
      .loaded #splash-screen {
        opacity: 0;
        visibility: hidden;
      }
    </style>

    <script>
      (function() {
        const t = localStorage.getItem('operon_theme') || 'white-cherry';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="splash-screen">
      <!-- Custom Cloud AI Logo -->
      <svg id="splash-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF1A6B;stop-opacity:1" />
          </linearGradient>
          <filter id="cloud-glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <!-- Minimalist Cloud Shape -->
        <g>
          <path d="M25 65 A15 15 0 0 1 25 35 A20 20 0 0 1 65 35 A15 15 0 0 1 65 65 Z" fill="url(#cloud-grad)" />
          <circle cx="45" cy="40" r="18" fill="url(#cloud-grad)" />
          <circle cx="65" cy="50" r="15" fill="url(#cloud-grad)" />
          <circle cx="35" cy="50" r="15" fill="url(#cloud-grad)" />
          <!-- Connectivity dots -->
          <circle cx="50" cy="50" r="2" fill="white">
            <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
          </circle>
        </g>
      </svg>
      <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px;">
        <div style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 0.3em; color: #FFFFFF; text-transform: uppercase; opacity: 0.8;">Loading...</div>
        <div style="width: 100px; height: 2px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; border-radius: 10px;">
           <div style="position: absolute; inset: 0; background: linear-gradient(90deg, transparent, #FF6B1A, transparent); animation: loading-bar 1.5s infinite linear;"></div>
        </div>
      </div>
      <style>
        @keyframes loading-bar {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
        #splash-logo {
          width: 120px;
          height: 120px;
          animation: float-cloud 3s ease-in-out infinite;
        }
        @keyframes float-cloud {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-10px); }
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const hideSplash = () => {
        document.body.classList.add('loaded');
      };
      window.addEventListener('load', () => {
        setTimeout(hideSplash, 1000);
      });
      // Safety Fallback: Hide splash after 5 seconds no matter what
      setTimeout(hideSplash, 5000);
    </script>
  </body>
</html>
